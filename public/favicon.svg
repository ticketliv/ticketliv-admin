<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Main ticket gradient -->
    <linearGradient id="grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7C6FFF"/>
      <stop offset="50%"  stop-color="#5048E8"/>
      <stop offset="100%" stop-color="#3430C4"/>
    </linearGradient>

    <!-- Subtle inner shine at top -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Stub area darker overlay -->
    <linearGradient id="stubGrad" x1="0" y1="340" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Mask: full canvas ticket with LEFT + RIGHT notch cutouts -->
    <mask id="ticketMask">
      <rect x="0" y="0" width="512" height="512" rx="72" ry="72" fill="white"/>
      <!-- Left notch at stub separator level -->
      <circle cx="0"   cy="350" r="44" fill="black"/>
      <!-- Right notch at stub separator level -->
      <circle cx="512" cy="350" r="44" fill="black"/>
    </mask>

    <!-- Glow filter for LIV text -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ═══ TICKET BACKGROUND (full canvas) ═══ -->
  <rect x="0" y="0" width="512" height="512" rx="72" fill="url(#grad)" mask="url(#ticketMask)"/>

  <!-- Inner shine overlay (top area) -->
  <rect x="0" y="0" width="512" height="340" rx="72" fill="url(#shine)" mask="url(#ticketMask)"/>

  <!-- ═══ STUB AREA DARKER OVERLAY ═══ -->
  <rect x="0" y="340" width="512" height="172" fill="url(#stubGrad)" mask="url(#ticketMask)"/>

  <!-- ═══ DASHED SEPARATOR LINE ═══ -->
  <line
    x1="50"  y1="350"
    x2="462" y2="350"
    stroke="rgba(255,255,255,0.25)"
    stroke-width="3"
    stroke-dasharray="12 9"
    stroke-linecap="round"
  />

  <!-- ═══ DECORATIVE CORNER STARS (main body) ═══ -->
  <!-- Top-left star -->
  <circle cx="72"  cy="72"  r="5" fill="rgba(255,255,255,0.5)"/>
  <line x1="72" y1="56" x2="72" y2="88" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="72" x2="88" y2="72" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>

  <!-- Top-right star -->
  <circle cx="440" cy="72"  r="5" fill="rgba(255,255,255,0.5)"/>
  <line x1="440" y1="56" x2="440" y2="88" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  <line x1="424" y1="72" x2="456" y2="72" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>

  <!-- ═══ MAIN BODY — "LIV" BRANDING ═══ -->
  <!-- Soft radial glow behind LIV -->
  <ellipse cx="256" cy="210" rx="200" ry="120" fill="#9C8FFF" opacity="0.12"/>

  <!-- "LIV" text — ultra bold, perfectly centered in main body -->
  <text
    x="256"
    y="205"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="190"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="8"
    filter="url(#glow)"
  >LIV</text>


</svg>
